name: lint

on: pull_request

jobs:
  super-linter:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Get changed validatable files
        id: changed-validatabe-files
        uses: tj-actions/changed-files@v44
        with:
          # Avoid using single or double quotes for multiline patterns
          files: |
             **.cs
             .github/workflows/**

      - name: Setup linting config
        id: config
        run: |
          echo "noChangedValidatableFiles = ${noChangedValidatableFiles}"
          echo "isDependabot = ${isDependabot}"
          if [ "${noChangedValidatableFiles}" ] || [ "${isDependabot}" ]; then
            echo "{VALIDATE_ALL_CODEBASE}=true"
            echo "{VALIDATE_ALL_CODEBASE}=true" >> $GITHUB_OUTPUT
          else
            echo "{VALIDATE_ALL_CODEBASE}=false"
            echo "{VALIDATE_ALL_CODEBASE}=false" >> $GITHUB_OUTPUT
          fi
        env:
          noChangedValidatableFiles: steps.changed-validatabe-files.outputs.all_changed_files.length == 0
          isDependabot: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}

      - name: Run super-linter
        uses: super-linter/super-linter@v6.3.0  # x-release-please-version
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_EXCLUDE: (./\.editorconfig|\.idea/*|\.vscode/*)
          IGNORE_GENERATED_FILES: true
          # false -> only checks changed files
          VALIDATE_ALL_CODEBASE: ${{ steps.config.outputs.VALIDATE_ALL_CODEBASE }}
          VALIDATE_CSHARP: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_YAML: true

  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Spellcheck
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: .cspell.json
          check_dot_files: false
          incremental_files_only: true

