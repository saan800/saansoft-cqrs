on: workflow_call

permissions:
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Download dotnet test results
        uses: actions/download-artifact@v3
        with:
          path: reports

      - uses: dorny/test-reporter@v1
        with:
          name: Unit test results                     # Name of the check run which will be created
          path: "reports/unit-test-results-*/*.trx"   # Path to test results (inside artifact .zip)
          reporter: dotnet-trx                        # Format of test results
          fail-on-error: true

