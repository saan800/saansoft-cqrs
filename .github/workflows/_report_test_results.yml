on: workflow_call

permissions:
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports
        #  pattern: unit-test-results-*
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: TEMP Display structure of downloaded files
        run: ls -R reports

      - name: Build and upload report
        uses: dorny/test-reporter@v1
        with:
          name: Unit test results                     # Name of the check run which will be created
          path: "reports/unit-test-results-*/*.trx"   # Path to test results (inside artifact .zip)
          reporter: dotnet-trx                        # Format of test results
          fail-on-error: true

