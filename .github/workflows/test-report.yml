name: 'Test Report'
on:
  workflow_run:
    workflows: ['CI']                     # runs after CI workflow
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  reports2:
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dotnet test results
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Upload test report
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: test-results2                # Name of the check run which will be created
          path: "reports/test-results-*/*.trx"           # Path to test results (inside artifact .zip)
          reporter: dotnet-trx              # Format of test results
          fail-on-error: true
